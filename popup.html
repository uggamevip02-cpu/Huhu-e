<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 380px;
            padding: 15px;
            background: #0a0e17;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        h2 {
            color: #00d4ff;
            font-size: 16px;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #1a2332;
            padding-bottom: 10px;
        }
        .header-group {
            margin: 8px 0;
            background: #1a2332;
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }
        .header-group .label {
            font-size: 11px;
            color: #8899aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header-group .value {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #fff;
            word-break: break-all;
            margin-top: 3px;
            max-height: 60px;
            overflow-y: auto;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .btn-copy {
            background: #00d4ff;
            color: #0a0e17;
        }
        .btn-copy:hover {
            background: #00e5ff;
        }
        .btn-refresh {
            background: #2a3342;
            color: #fff;
        }
        .btn-refresh:hover {
            background: #3a4a5a;
        }
        .btn-copy-all {
            background: #00ff88;
            color: #0a0e17;
        }
        .btn-copy-all:hover {
            background: #33ff99;
        }
        .status {
            font-size: 12px;
            color: #8899aa;
            text-align: center;
            margin-top: 8px;
        }
        .status.success {
            color: #00ff88;
        }
        .status.error {
            color: #ff4444;
        }
        .platform-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            margin: 2px;
        }
        .platform-tag.instagram { background: #E1306C44; color: #E1306C; }
        .platform-tag.facebook { background: #1877f244; color: #1877f2; }
        .platform-tag.tiktok { background: #00f2ea44; color: #00f2ea; }
        .divider {
            border: none;
            border-top: 1px solid #1a2332;
            margin: 10px 0;
        }
        .row {
            display: flex;
            gap: 8px;
        }
        .row .btn {
            flex: 1;
        }
    </style>
</head>
<body>
    <h2>🔑 GoLike API Copier</h2>

    <div id="apiData">
        <div class="status">📡 Đang lấy dữ liệu...</div>
    </div>

    <hr class="divider">

    <button class="btn btn-refresh" onclick="refreshData()">🔄 Refresh Headers</button>

    <div class="row">
        <button class="btn btn-copy" onclick="copyHeader('Authorization')">📋 Auth</button>
        <button class="btn btn-copy" onclick="copyHeader('t')">📋 Token T</button>
        <button class="btn btn-copy" onclick="copyHeader('g-avatar')">📋 Avatar</button>
    </div>

    <button class="btn btn-copy-all" onclick="copyAllHeaders()">📋 Copy All Headers (JSON)</button>

    <div class="status" id="statusMsg">Sẵn sàng</div>

    <script src="popup.js"></script>
</body>
</html>
